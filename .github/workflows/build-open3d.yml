name: Build Open3D CUDA for Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    
    steps:
      - name: Checkout Open3D
        uses: actions/checkout@v4
        with:
          repository: 'isl-org/Open3D'
          ref: '7dd7bc150bdf86327f956838baef3f64fbe2f4ca'
          submodules: true

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14.6'

      - name: Install CUDA Toolkit 13.2
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '13.2.0'
          method: 'network'

      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip==24.3.1
          python -m pip install -r python/requirements_build.txt
          python -m pip install cmake ninja

      - name: Configure and Build
        shell: powershell
        run: |
          $env:CL="/DCCCL_IGNORE_MSVC_TRADITIONAL_PREPROCESSOR_WARNING /Zc:preprocessor"
          New-Item -Path "build_cuda" -ItemType Directory
          cd build_cuda
          cmake -G "Ninja" `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_CUDA_MODULE=ON `
            -DENABLE_EMBREE=OFF `
            -DBUILD_GUI=OFF `
            -DBUILD_EXAMPLES=OFF `
            -DBUILD_UNIT_TESTS=OFF `
            -DPYTHON_EXECUTABLE=(Get-Command python).Source `
            ..
          cmake --build . --target pip-package

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: open3d-cuda-cp314
          path: build_cuda/lib/python_package/pip_package/*.whl
