name: Windows CUDA Wheel Build

on:
  workflow_dispatch:

env:
  PIP_VER: "24.3.1"
  CUDA_VERSION: "12.6.0"
  SRC_DIR: "D:\\a\\open3d\\open3d"
  BUILD_DIR: "C:\\Open3D\\build"
  NPROC: 6

jobs:
  windows-cuda-wheel:
    runs-on: windows-2022

    steps:
      - name: Install CUDA
        run: |
          # [Логика установки CUDA 12.6, см. источник 0.1.1]
          Invoke-WebRequest ...
          Start-Process -Wait -FilePath .\cuda.exe -ArgumentList "-s ..."

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.14.6'

      - name: Build Python package
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          # [Конфигурация CMake с CUDA=ON и сборка через target pip-package, см. источник 0.1.1]
          cmake -DBUILD_CUDA_MODULE=ON ...
          cmake --build . --target pip-package

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: open3d-cuda-cp314-wheel
          path: C:\Open3D\build\lib\python_package\pip_package\*.whl
